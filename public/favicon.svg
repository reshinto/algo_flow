<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="10" fill="#09090b"/>

  <!-- Bar 1: default/unvisited -->
  <rect x="6"  y="30" width="6" height="12" rx="1.5" fill="#71717a"/>

  <!-- Bar 2: default/unvisited -->
  <rect x="14" y="24" width="6" height="18" rx="1.5" fill="#71717a"/>

  <!-- Bar 3: comparing/active — cyan -->
  <rect x="22" y="14" width="6" height="28" rx="1.5" fill="#22d3ee"/>
  <!-- Scan line cap on active bar -->
  <rect x="22" y="13" width="6" height="2.5" rx="1" fill="#22d3ee" opacity="0.45"/>

  <!-- Bar 4: sorted -->
  <rect x="30" y="18" width="6" height="24" rx="1.5" fill="#34d399"/>

  <!-- Bar 5: sorted, tallest -->
  <rect x="38" y="8"  width="6" height="34" rx="1.5" fill="#34d399"/>
</svg>
