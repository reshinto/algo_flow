name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typechecks:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

  tests:
    name: Unit Test Shard
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/8, 2/8, 3/8, 4/8, 5/8, 6/8, 7/8, 8/8]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test -- --shard=${{ matrix.shard }}

  unit-test-status:
    name: Unit Tests Status
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    steps:
      - name: Check unit test shard results
        run: |
          if [ "${{ needs.tests.result }}" = "success" ]; then
            echo "All unit test shards passed"
            exit 0
          else
            echo "Unit test shards failed: ${{ needs.tests.result }}"
            exit 1
          fi

  build-pages:
    name: Build Pages
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [typechecks, unit-test-status]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
