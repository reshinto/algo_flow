name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typechecks:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

  tests:
    name: Unit Test Shard
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/12, 2/12, 3/12, 4/12, 5/12, 6/12, 7/12, 8/12, 9/12, 10/12, 11/12, 12/12]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test -- --shard=${{ matrix.shard }}

  unit-test-status:
    name: Unit Tests Status
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    steps:
      - name: Check unit test shard results
        run: |
          if [ "${{ needs.tests.result }}" = "success" ]; then
            echo "All unit test shards passed"
            exit 0
          else
            echo "Unit test shards failed: ${{ needs.tests.result }}"
            exit 1
          fi

  e2e:
    name: E2E Shard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard:
          [
            1/16,
            2/16,
            3/16,
            4/16,
            5/16,
            6/16,
            7/16,
            8/16,
            9/16,
            10/16,
            11/16,
            12/16,
            13/16,
            14/16,
            15/16,
            16/16,
          ]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Build for E2E
        run: npm run build

      - name: Run E2E shard
        run: npx playwright test --config=e2e/playwright.config.ts --shard=${{ matrix.shard }}

  e2e-status:
    name: E2E Status
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    steps:
      - name: Check E2E shard results
        run: |
          if [ "${{ needs.e2e.result }}" = "success" ]; then
            echo "All E2E shards passed"
            exit 0
          else
            echo "E2E shards failed: ${{ needs.e2e.result }}"
            exit 1
          fi

  python-tests:
    name: Python Test Shard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python tests
        run: bash scripts/test-python.sh --shard=${{ matrix.shard }} --workers=2

  python-test-status:
    name: Python Tests Status
    runs-on: ubuntu-latest
    needs: python-tests
    if: always()
    steps:
      - name: Check Python test shard results
        run: |
          if [ "${{ needs.python-tests.result }}" = "success" ]; then
            echo "All Python test shards passed"
            exit 0
          else
            echo "Python test shards failed: ${{ needs.python-tests.result }}"
            exit 1
          fi

  java-tests:
    name: Java Test Shard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run Java tests
        run: bash scripts/test-java.sh --shard=${{ matrix.shard }} --workers=2

  java-test-status:
    name: Java Tests Status
    runs-on: ubuntu-latest
    needs: java-tests
    if: always()
    steps:
      - name: Check Java test shard results
        run: |
          if [ "${{ needs.java-tests.result }}" = "success" ]; then
            echo "All Java test shards passed"
            exit 0
          else
            echo "Java test shards failed: ${{ needs.java-tests.result }}"
            exit 1
          fi

  rust-tests:
    name: Rust Test Shard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: [1/8, 2/8, 3/8, 4/8, 5/8, 6/8, 7/8, 8/8]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: bash scripts/test-rust.sh --shard=${{ matrix.shard }} --workers=2

  rust-test-status:
    name: Rust Tests Status
    runs-on: ubuntu-latest
    needs: rust-tests
    if: always()
    steps:
      - name: Check Rust test shard results
        run: |
          if [ "${{ needs.rust-tests.result }}" = "success" ]; then
            echo "All Rust test shards passed"
            exit 0
          else
            echo "Rust test shards failed: ${{ needs.rust-tests.result }}"
            exit 1
          fi

  cpp-tests:
    name: C++ Test Shard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    steps:
      - uses: actions/checkout@v6

      - name: Run C++ tests
        run: bash scripts/test-cpp.sh --shard=${{ matrix.shard }} --workers=2

  cpp-test-status:
    name: C++ Tests Status
    runs-on: ubuntu-latest
    needs: cpp-tests
    if: always()
    steps:
      - name: Check C++ test shard results
        run: |
          if [ "${{ needs.cpp-tests.result }}" = "success" ]; then
            echo "All C++ test shards passed"
            exit 0
          else
            echo "C++ test shards failed: ${{ needs.cpp-tests.result }}"
            exit 1
          fi

  go-tests:
    name: Go Test Shard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Run Go tests
        run: bash scripts/test-go.sh --shard=${{ matrix.shard }} --workers=2

  go-test-status:
    name: Go Tests Status
    runs-on: ubuntu-latest
    needs: go-tests
    if: always()
    steps:
      - name: Check Go test shard results
        run: |
          if [ "${{ needs.go-tests.result }}" = "success" ]; then
            echo "All Go test shards passed"
            exit 0
          else
            echo "Go test shards failed: ${{ needs.go-tests.result }}"
            exit 1
          fi

  storybook:
    name: Storybook Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Storybook
        run: npm run storybook:build -- --disable-telemetry

  chromatic:
    name: Visual Tests (Chromatic)
    runs-on: ubuntu-latest
    needs: storybook
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          buildScriptName: storybook:build
