name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typechecks:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

  tests:
    name: Unit Test Shard
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/10, 2/10, 3/10, 4/10, 5/10, 6/10, 7/10, 8/10, 9/10, 10/10]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test -- --shard=${{ matrix.shard }}

  unit-test-status:
    name: Unit Tests Status
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    steps:
      - name: Check unit test shard results
        run: |
          if [ "${{ needs.tests.result }}" = "success" ]; then
            echo "All unit test shards passed"
            exit 0
          else
            echo "Unit test shards failed: ${{ needs.tests.result }}"
            exit 1
          fi

  e2e:
    name: E2E Shard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard:
          [1/14, 2/14, 3/14, 4/14, 5/14, 6/14, 7/14, 8/14, 9/14, 10/14, 11/14, 12/14, 13/14, 14/14]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Build for E2E
        run: npm run build

      - name: Run E2E shard
        run: npx playwright test --config=e2e/playwright.config.ts --shard=${{ matrix.shard }}

  e2e-status:
    name: E2E Status
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    steps:
      - name: Check E2E shard results
        run: |
          if [ "${{ needs.e2e.result }}" = "success" ]; then
            echo "All E2E shards passed"
            exit 0
          else
            echo "E2E shards failed: ${{ needs.e2e.result }}"
            exit 1
          fi

  storybook:
    name: Storybook Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Storybook
        run: npm run storybook:build -- --disable-telemetry

  chromatic:
    name: Visual Tests (Chromatic)
    runs-on: ubuntu-latest
    needs: storybook
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          buildScriptName: storybook:build
