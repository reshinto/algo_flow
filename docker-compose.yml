# Docker Compose for AlgoFlow. Builds the multi-stage Dockerfile and serves
# the production build via nginx on port 3000, with a health check endpoint.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
